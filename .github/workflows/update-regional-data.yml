name: Update Regional Mythic Rank Data

on:
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Publish selected packages even when regional data is unchanged"
        required: true
        type: boolean
        default: false
      regions:
        description: "Regions to force publish: all or comma-separated CN,US,EU,TW,KR"
        required: true
        type: string
        default: "all"
  schedule:
    # 01:17 UTC = 09:17 China Standard Time.
    - cron: "17 1 * * *"
    # 13:17 UTC = 21:17 China Standard Time.
    - cron: "17 13 * * *"

permissions:
  contents: write

# Share the group with the manual publisher so two CurseForge uploads cannot overlap.
concurrency:
  group: curseforge-regional-publish
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install --yes lua5.1

      - name: Verify shared Core.lua synchronization
        run: python scripts/sync_core.py --check

      - name: Fetch and validate all regional cutoff data
        env:
          RAIDERIO_ACCESS_KEY: ${{ secrets.RAIDERIO_ACCESS_KEY }}
        run: python scripts/update_all_regions.py

      - name: Detect publishable regional data changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          python scripts/detect_regional_data_changes.py \
            --base-ref HEAD \
            --github-output "${GITHUB_OUTPUT}"

      - name: Resolve regional publishing scope
        id: publish_scope
        shell: bash
        env:
          DATA_CHANGED: ${{ steps.changes.outputs.changed }}
          CHANGED_REGIONS: ${{ steps.changes.outputs.changed_regions }}
          FORCE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.force_publish || false }}
          REQUESTED_REGIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.regions || 'all' }}
          WORKFLOW_REF: ${{ github.ref }}
          PUBLISH_REF: refs/heads/main
        run: |
          set -euo pipefail
          python scripts/resolve_publish_scope.py --github-output "${GITHUB_OUTPUT}"

      - name: Run test suite against updated data
        if: steps.publish_scope.outputs.should_publish == 'true'
        env:
          LUA51: /usr/bin/lua5.1
        run: python -m pytest -v

      - name: Validate updated Lua 5.1 syntax
        if: steps.publish_scope.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          luac5.1 -p shared/Core.lua
          for region in CN US EU TW KR; do
            luac5.1 -p "QFXMythicRankData_${region}/Core.lua"
            luac5.1 -p "QFXMythicRankData_${region}/Data.lua"
          done

      - name: Build installable regional packages
        if: steps.publish_scope.outputs.should_publish == 'true'
        shell: bash
        env:
          PUBLISH_REGIONS: ${{ steps.publish_scope.outputs.regions }}
        run: |
          set -euo pipefail
          IFS=',' read -ra regions <<< "${PUBLISH_REGIONS}"
          args=()
          for region in "${regions[@]}"; do
            args+=("$(echo "$region" | tr '[:upper:]' '[:lower:]')")
          done
          rm -rf dist
          python scripts/build_packages.py --regions "${args[@]}"

      - name: Validate generated packages offline
        if: steps.publish_scope.outputs.should_publish == 'true'
        shell: bash
        env:
          PUBLISH_REGIONS: ${{ steps.publish_scope.outputs.regions }}
        run: |
          set -euo pipefail
          IFS=',' read -ra regions <<< "${PUBLISH_REGIONS}"
          args=()
          for region in "${regions[@]}"; do
            args+=("$(echo "$region" | tr '[:upper:]' '[:lower:]')")
          done
          python scripts/publish_curseforge_auto.py \
            --artifact-dir dist \
            --regions "${args[@]}" \
            --mode validate \
            --changelog-file publish-report/changelog.md \
            --report-file publish-report/prepublish-validation.json \
            --source-run-id "${GITHUB_RUN_ID}" \
            --source-artifact-id 0 \
            --source-commit pending

      - name: Create the regional data commit locally
        if: steps.changes.outputs.changed == 'true'
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          files=(
            QFXMythicRankData_CN/Data.lua
            QFXMythicRankData_CN/QFXMythicRankData_CN.toc
            QFXMythicRankData_US/Data.lua
            QFXMythicRankData_US/QFXMythicRankData_US.toc
            QFXMythicRankData_EU/Data.lua
            QFXMythicRankData_EU/QFXMythicRankData_EU.toc
            QFXMythicRankData_TW/Data.lua
            QFXMythicRankData_TW/QFXMythicRankData_TW.toc
            QFXMythicRankData_KR/Data.lua
            QFXMythicRankData_KR/QFXMythicRankData_KR.toc
          )
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${files[@]}"
          git commit -m "Update regional Mythic+ cutoff data"
          echo "commit_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Resolve publishing source commit
        if: steps.publish_scope.outputs.should_publish == 'true'
        id: source_commit
        shell: bash
        env:
          DATA_CHANGED: ${{ steps.changes.outputs.changed }}
          GENERATED_COMMIT: ${{ steps.commit.outputs.commit_sha }}
          WORKFLOW_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "${DATA_CHANGED}" == "true" ]]; then
            if [[ ! "${GENERATED_COMMIT}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Generated commit SHA is invalid." >&2
              exit 1
            fi
            echo "sha=${GENERATED_COMMIT}" >> "${GITHUB_OUTPUT}"
          else
            if [[ ! "${WORKFLOW_COMMIT}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Workflow commit SHA is invalid." >&2
              exit 1
            fi
            echo "sha=${WORKFLOW_COMMIT}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload regional package Artifact
        if: steps.publish_scope.outputs.should_publish == 'true'
        id: packages
        uses: actions/upload-artifact@v4
        with:
          name: QFXMythicRankData-packages-${{ github.run_id }}
          path: dist/*.zip
          retention-days: 5
          if-no-files-found: error

      - name: Upload changed regional packages to CurseForge
        if: steps.publish_scope.outputs.should_publish == 'true'
        id: curseforge
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          PUBLISH_REGIONS: ${{ steps.publish_scope.outputs.regions }}
        run: |
          set -euo pipefail
          IFS=',' read -ra regions <<< "${PUBLISH_REGIONS}"
          args=()
          for region in "${regions[@]}"; do
            args+=("$(echo "$region" | tr '[:upper:]' '[:lower:]')")
          done
          python scripts/publish_curseforge_auto.py \
            --artifact-dir dist \
            --regions "${args[@]}" \
            --mode upload \
            --changelog-file publish-report/changelog.md \
            --report-file publish-report/report.json \
            --source-run-id "${GITHUB_RUN_ID}" \
            --source-artifact-id "${{ steps.packages.outputs.artifact-id }}" \
            --source-commit "${{ steps.source_commit.outputs.sha }}"

      - name: Upload safe CurseForge publishing report
        if: always() && steps.publish_scope.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: curseforge-publish-report-${{ github.run_id }}
          path: publish-report/report.json
          retention-days: 30
          if-no-files-found: warn

      - name: Push published regional data to main
        if: steps.changes.outputs.changed == 'true' && steps.curseforge.outcome == 'success'
        shell: bash
        run: git push origin HEAD:main
